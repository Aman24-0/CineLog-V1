# ============================================
# Netlify Configuration for CineLog
# ============================================

[build]
  command = "npm run build"
  publish = "dist"

# ============================================
# SPA Routing Fix
# ============================================
# Prevents 404 errors when refreshing or directly accessing pages
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================
# Security Headers
# ============================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ============================================
# Performance: Cache Static Assets
# ============================================
# Cache JS, CSS, and image assets for 1 year
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
